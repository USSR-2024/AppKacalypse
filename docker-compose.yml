# AppKacalypse — единый стек (one-server).
# GPU нужен только сервису ollama (nvidia-container-toolkit).
# Для dev без GPU: docker compose up -d postgres llm-gateway
#   и LLM_PROVIDER=mock.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # Доступ к LiveKit (host-network :7880) для проксирования wss meet.appka.space.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN_TASKS: ${DOMAIN_TASKS}
      ACME_EMAIL: ${ACME_EMAIL}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-gateway:
    build: ./services/llm-gateway
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_CONFIDENCE_THRESHOLD: ${LLM_CONFIDENCE_THRESHOLD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      CALENDAR_DEFAULT_TIMEZONE: ${CALENDAR_DEFAULT_TIMEZONE}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Только на loopback хоста, наружу не торчит. Нужен GPU-агенту (он в host-network):
    # перед загрузкой своих весов он просит ollama снять qwen с карты — иначе тот
    # держит её всю по keep_alive и субтитрам не хватает места.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/backup.sh"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
    volumes:
      - ./infra/backup.sh:/backup.sh:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  ollama-data:
