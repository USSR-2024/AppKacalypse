# Наше приложение (бэк + фронт) поверх существующего стека.
# Подключается к общей сети appkacalypse_default → видит postgres, llm-gateway;
# Caddy из той же сети проксирует на backend:8081 и frontend:3000.
services:
  backend:
    build: ./backend
    image: akc-backend
    container_name: akc-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      ALLOW_DEV_AUTH: "0"   # прод: dev-вход выключен жёстко
      # LiveKit HTTP API (egress) на хосте (host-net); из контейнера — через host-gateway.
      LIVEKIT_HTTP_URL: "http://host.docker.internal:7880"
      # MinIO: бэк в одной сети → по имени контейнера. Egress (host-net) — через loopback.
      S3_ENDPOINT: "http://akc-minio:9000"
      S3_EGRESS_ENDPOINT: "http://127.0.0.1:9000"
      S3_BUCKET: "recordings"
    # host.docker.internal → хост (там LiveKit на 7880).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Только loopback 158 — для SSH-туннеля релея (89→158). Наружу НЕ публикуется.
    ports:
      - "127.0.0.1:8081:8081"
    # Общий том с хостовым воркером расшифровок: бэк принимает аудио и отдаёт
    # результаты, воркер (на хосте) читает аудио и пишет transcript.txt/protocol.md.
    volumes:
      - /root/transcribe/data:/data
    networks: [default]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_TG_BOT: appKACAlypse_bot
        NEXT_PUBLIC_ALLOW_DEV: "0"
    image: akc-frontend
    container_name: akc-frontend
    restart: unless-stopped
    environment:
      # Серверный рендер карточки-превью для /join/<code> ходит в бэк по сети docker.
      # В браузер это не попадает: /api/* снаружи забирает Caddy, Next в проде не участвует.
      BACKEND_URL: http://backend:8081
    networks: [default]

  # ONLYOFFICE Document Server — редактор документов (модуль «Документы»).
  # Браузер грузит api.js и держит WebSocket напрямую с DS через docs.appka.space
  # (Caddy → akc-docs:80); бэкенд ходит в DS по внутреннему имени за Command/Convert
  # Service. Секрет JWT — в infra/ds.env (НЕ в git; общий с backend/.env DS_JWT_SECRET).
  documentserver:
    image: onlyoffice/documentserver:9.4   # тег зафиксирован (ТЗ §4.2): :latest ломает перенос
    container_name: akc-docs
    restart: unless-stopped
    env_file: ./infra/ds.env
    volumes:
      - ds_data:/var/www/onlyoffice/Data
      - ds_logs:/var/log/onlyoffice
      - ds_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
    ports:
      - "127.0.0.1:8082:80"   # loopback: наружу отдаёт только Caddy по HTTPS
    networks: [default]

networks:
  default:
    external: true
    name: appkacalypse_default

volumes:
  ds_data: { name: ds_data }
  ds_logs: { name: ds_logs }
  ds_cache: { name: ds_cache }
